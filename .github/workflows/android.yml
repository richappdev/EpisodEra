name: Android CI

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble Android debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug and unit tests
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug :core:model:testDebugUnitTest --stacktrace

  instrumentation-test:
    name: Android emulator smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          working-directory: ./android
          script: |
            mkdir -p app/build/outputs/androidTest-artifacts
            set +e
            ./gradlew :app:connectedDebugAndroidTest --stacktrace
            test_status=$?
            adb logcat -d > app/build/outputs/androidTest-artifacts/logcat.txt
            adb exec-out screencap -p > app/build/outputs/androidTest-artifacts/emulator.png
            exit "$test_status"

      - name: Upload instrumentation test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-${{ github.run_id }}
          path: |
            android/app/build/reports/androidTests/connected/
            android/app/build/outputs/androidTest-results/connected/
            android/app/build/outputs/androidTest-artifacts/
          retention-days: 14
          if-no-files-found: warn
